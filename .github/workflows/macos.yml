name: macOS

on:
  push:
    tags:
      - 'v*'

env:
  GITLAB: https://gitlab.simultech.it
  PROJECT: simultech%2Fcall-recorder
  BINARY: call-recorder

jobs:
  build:
    strategy:
      matrix:
        include:
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build
        run: |
          CGO_ENABLED=1 go build -ldflags="-s -w" \
            -o ${{ env.BINARY }}-darwin-${{ matrix.arch }} .
          CGO_ENABLED=1 go build -ldflags="-s -w" -tags notray \
            -o ${{ env.BINARY }}-darwin-${{ matrix.arch }}-cli .

      - name: Upload to GitLab Package Registry
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          BASE="${{ env.GITLAB }}/api/v4/projects/${{ env.PROJECT }}/packages/generic/${{ env.BINARY }}/${TAG}"
          curl --fail -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            --upload-file ${{ env.BINARY }}-darwin-${{ matrix.arch }} \
            "${BASE}/${{ env.BINARY }}-darwin-${{ matrix.arch }}"
          curl --fail -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            --upload-file ${{ env.BINARY }}-darwin-${{ matrix.arch }}-cli \
            "${BASE}/${{ env.BINARY }}-darwin-${{ matrix.arch }}-cli"

      - name: Add GitLab release links
        env:
          GITLAB_TOKEN: ${{ secrets.GITLAB_TOKEN }}
          TAG: ${{ github.ref_name }}
          ARCH: ${{ matrix.arch }}
        run: |
          BASE="${{ env.GITLAB }}/api/v4/projects/${{ env.PROJECT }}"
          PKG="${BASE}/packages/generic/${{ env.BINARY }}/${TAG}"

          curl -s -X POST \
            -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"macOS ${ARCH} (con tray)\",\"url\":\"${PKG}/${{ env.BINARY }}-darwin-${ARCH}\"}" \
            "${BASE}/releases/${TAG}/assets/links"

          curl -s -X POST \
            -H "PRIVATE-TOKEN: $GITLAB_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"name\":\"macOS ${ARCH} (CLI, zero deps)\",\"url\":\"${PKG}/${{ env.BINARY }}-darwin-${ARCH}-cli\"}" \
            "${BASE}/releases/${TAG}/assets/links"
