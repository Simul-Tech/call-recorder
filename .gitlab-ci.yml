stages:
  - build
  - upload
  - release

variables:
  PKG_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/call-recorder/${CI_COMMIT_TAG}"

.build-base:
  stage: build
  image: golang:1.21
  rules:
    - if: $CI_COMMIT_TAG

# ── Linux ────────────────────────────────────────────────────────────────────

build-linux-amd64:
  extends: .build-base
  script:
    - CGO_ENABLED=1 GOOS=linux GOARCH=amd64
      go build -ldflags="-s -w" -o call-recorder-linux-amd64 .
  artifacts:
    paths: [call-recorder-linux-amd64]

build-linux-arm64:
  extends: .build-base
  script:
    - apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu
    - CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc
      go build -ldflags="-s -w" -o call-recorder-linux-arm64 .
  artifacts:
    paths: [call-recorder-linux-arm64]

# ── Windows ──────────────────────────────────────────────────────────────────

build-windows-amd64:
  extends: .build-base
  script:
    - apt-get update -qq && apt-get install -y -qq mingw-w64
    - CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc
      go build -ldflags="-s -w" -o call-recorder-windows-amd64.exe .
  artifacts:
    paths: [call-recorder-windows-amd64.exe]

# ── macOS ────────────────────────────────────────────────────────────────────
# Richiede un runner macOS registrato con il tag "macos".
# Senza runner macOS questo job viene semplicemente saltato.

build-macos-amd64:
  extends: .build-base
  tags: [macos]
  script:
    - CGO_ENABLED=1 GOOS=darwin GOARCH=amd64
      go build -ldflags="-s -w" -o call-recorder-macos-amd64 .
  artifacts:
    paths: [call-recorder-macos-amd64]
  allow_failure: true

build-macos-arm64:
  extends: .build-base
  tags: [macos]
  script:
    - CGO_ENABLED=1 GOOS=darwin GOARCH=arm64
      go build -ldflags="-s -w" -o call-recorder-macos-arm64 .
  artifacts:
    paths: [call-recorder-macos-arm64]
  allow_failure: true

# ── Upload al Package Registry ────────────────────────────────────────────────

upload:
  stage: upload
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build-linux-amd64
    - build-linux-arm64
    - build-windows-amd64
    - job: build-macos-amd64
      optional: true
    - job: build-macos-arm64
      optional: true
  script:
    - |
      for f in call-recorder-linux-amd64 call-recorder-linux-arm64 \
                call-recorder-windows-amd64.exe \
                call-recorder-macos-amd64 call-recorder-macos-arm64; do
        [ -f "$f" ] || continue
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$f" "${PKG_URL}/${f}"
        echo "uploaded $f"
      done

# ── Crea la Release ───────────────────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs: [upload]
  script:
    - echo "Release ${CI_COMMIT_TAG}"
  release:
    name: "Release ${CI_COMMIT_TAG}"
    tag_name: "${CI_COMMIT_TAG}"
    description: "Binari precompilati per Linux, Windows e macOS."
    assets:
      links:
        - name: call-recorder-linux-amd64
          url: "${PKG_URL}/call-recorder-linux-amd64"
        - name: call-recorder-linux-arm64
          url: "${PKG_URL}/call-recorder-linux-arm64"
        - name: call-recorder-windows-amd64.exe
          url: "${PKG_URL}/call-recorder-windows-amd64.exe"
        - name: call-recorder-macos-amd64
          url: "${PKG_URL}/call-recorder-macos-amd64"
        - name: call-recorder-macos-arm64
          url: "${PKG_URL}/call-recorder-macos-arm64"
