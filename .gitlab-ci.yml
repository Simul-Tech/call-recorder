stages:
  - build
  - upload
  - release

variables:
  PKG_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/call-recorder/${CI_COMMIT_TAG}"

.build-base:
  stage: build
  image: golang:1.21
  rules:
    - if: $CI_COMMIT_TAG

# ── Linux ─────────────────────────────────────────────────────────────────────

build-linux-amd64:
  extends: .build-base
  script:
    - CGO_ENABLED=1 GOOS=linux GOARCH=amd64
      go build -ldflags="-s -w" -o call-recorder-linux-amd64 .
    - CGO_ENABLED=1 GOOS=linux GOARCH=amd64
      go build -ldflags="-s -w" -tags notray -o call-recorder-linux-amd64-cli .
  artifacts:
    paths:
      - call-recorder-linux-amd64
      - call-recorder-linux-amd64-cli

build-linux-arm64:
  extends: .build-base
  script:
    - apt-get update -qq && apt-get install -y -qq gcc-aarch64-linux-gnu
    - CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc
      go build -ldflags="-s -w" -o call-recorder-linux-arm64 .
    - CGO_ENABLED=1 GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc
      go build -ldflags="-s -w" -tags notray -o call-recorder-linux-arm64-cli .
  artifacts:
    paths:
      - call-recorder-linux-arm64
      - call-recorder-linux-arm64-cli

# ── Windows ───────────────────────────────────────────────────────────────────

build-windows-amd64:
  extends: .build-base
  script:
    - apt-get update -qq && apt-get install -y -qq mingw-w64
    - CGO_ENABLED=1 GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc
      go build -ldflags="-s -w" -o call-recorder-windows-amd64.exe .
  artifacts:
    paths:
      - call-recorder-windows-amd64.exe

# ── Upload ────────────────────────────────────────────────────────────────────

upload:
  stage: upload
  image: curlimages/curl:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs:
    - build-linux-amd64
    - build-linux-arm64
    - build-windows-amd64
  script:
    - |
      for f in call-recorder-linux-amd64 call-recorder-linux-amd64-cli \
                call-recorder-linux-arm64 call-recorder-linux-arm64-cli \
                call-recorder-windows-amd64.exe; do
        curl --fail --header "JOB-TOKEN: $CI_JOB_TOKEN" \
             --upload-file "$f" "${PKG_URL}/${f}"
        echo "uploaded $f"
      done

# ── Release ───────────────────────────────────────────────────────────────────

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: $CI_COMMIT_TAG
  needs: [upload]
  script:
    - echo "Release ${CI_COMMIT_TAG}"
  release:
    name: "Release ${CI_COMMIT_TAG}"
    tag_name: "${CI_COMMIT_TAG}"
    description: "Binari precompilati per Linux e Windows."
    assets:
      links:
        - name: "Linux x86_64 (con tray)"
          url: "${PKG_URL}/call-recorder-linux-amd64"
        - name: "Linux x86_64 (CLI, zero deps)"
          url: "${PKG_URL}/call-recorder-linux-amd64-cli"
        - name: "Linux ARM64 (con tray)"
          url: "${PKG_URL}/call-recorder-linux-arm64"
        - name: "Linux ARM64 (CLI, zero deps)"
          url: "${PKG_URL}/call-recorder-linux-arm64-cli"
        - name: "Windows x86_64"
          url: "${PKG_URL}/call-recorder-windows-amd64.exe"
